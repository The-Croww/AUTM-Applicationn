name: automato
description: AuTOMATO - IoT Greenhouse Monitoring App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/AUTM-Logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#F9F5F0"
  adaptive_icon_foreground: "assets/icon/AUTM-Logo.jpg"


flutter:
  uses-material-design: true